# IHMS-OMS — full checkout stack (like KB-IHMS: docker compose up --build)
#
# Quick start:
#   docker compose up --build
#   Checkout UI: http://localhost:5180  (5180 avoids KB-IHMS frontend on 5173)
#
# With Prometheus:
#   docker compose --profile obs up --build
#
# Real upstreams already running (KB-IHMS :5000, EC-OPS :8002):
#   cp .env.example .env && bash scripts/ecops-token.sh
#   docker compose up orchestrator ui --no-deps --build

x-orchestrator-env: &orchestrator-env
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  LOG_JSON: ${LOG_JSON:-true}
  CATALOG_SOURCE: ${CATALOG_SOURCE:-ihms}
  CATALOG_FALLBACK_TO_JSON: ${CATALOG_FALLBACK_TO_JSON:-false}
  IHMS_CATALOG_MODE: ${IHMS_CATALOG_MODE:-auto}
  CATALOG_PATH: /app/catalog/products.json
  ECOPS_MAPPING_PATH: /app/catalog/ecops-mapping.json

x-orchestrator-logging: &orchestrator-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  ihms:
    build:
      context: docker/mock-upstreams/ihms
      dockerfile: Dockerfile
    image: ${IHMS_IMAGE:-ihms-oms-mock-ihms:local}
    ports:
      - "${IHMS_PORT:-8080}:8080"
    networks:
      - checkout-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health')"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  ecops:
    build:
      context: docker/mock-upstreams/ecops
      dockerfile: Dockerfile
    image: ${ECOPS_IMAGE:-ihms-oms-mock-ecops:local}
    ports:
      - "${ECOPS_PORT:-8012}:8002"
    networks:
      - checkout-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8002/health')"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  orchestrator:
    build:
      context: .
      dockerfile: docker/Dockerfile.orchestrator
    ports:
      - "${ORCHESTRATOR_PORT:-8000}:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      <<: *orchestrator-env
      IHMS_BASE_URL: ${IHMS_BASE_URL:-http://ihms:8080}
      ECOPS_BASE_URL: ${ECOPS_BASE_URL:-http://ecops:8002}
      ECOPS_BEARER_TOKEN: ${ECOPS_BEARER_TOKEN:-}
      ECOPS_READ_TIMEOUT: ${ECOPS_READ_TIMEOUT:-2}
      IHMS_READ_TIMEOUT: ${IHMS_READ_TIMEOUT:-5}
    logging: *orchestrator-logging
    depends_on:
      ihms:
        condition: service_healthy
      ecops:
        condition: service_healthy
    networks:
      - checkout-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s

  ui:
    build:
      context: frontend
      dockerfile: Dockerfile
    ports:
      - "${UI_PORT:-5180}:5173"
    environment:
      VITE_API_URL: ""
    depends_on:
      orchestrator:
        condition: service_healthy
    networks:
      - checkout-net
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:5173/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  prometheus:
    image: prom/prometheus:v3.2.1
    profiles: ["obs"]
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    depends_on:
      orchestrator:
        condition: service_healthy
    networks:
      - checkout-net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

networks:
  checkout-net:
    driver: bridge

volumes:
  prometheus-data:
