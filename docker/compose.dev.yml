# Orchestrator-only dev stack. Upstreams started separately or mocked.
# Usage: docker compose -f docker/compose.base.yml -f docker/compose.dev.yml up

x-orchestrator-env: &orchestrator-env
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  LOG_JSON: ${LOG_JSON:-true}
  CATALOG_PATH: ${CATALOG_PATH:-/app/catalog/products.json}

x-orchestrator-logging: &orchestrator-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  orchestrator:
    build:
      context: ..
      dockerfile: docker/Dockerfile.orchestrator
    ports:
      - "${ORCHESTRATOR_PORT:-8000}:8000"
    environment:
      <<: *orchestrator-env
      IHMS_BASE_URL: ${IHMS_BASE_URL:-http://host.docker.internal:5000}
      ECOPS_BASE_URL: ${ECOPS_BASE_URL:-http://host.docker.internal:8002}
      CATALOG_PATH: /app/catalog/products.json
    volumes:
      - ../catalog:/app/catalog:ro
    logging: *orchestrator-logging
    networks:
      - checkout-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s

  ui:
    profiles: ["ui"]
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "${UI_PORT:-5173}:5173"
    environment:
      # Relative API paths; nginx proxies to orchestrator (see frontend/nginx.conf)
      VITE_API_URL: ""
    depends_on:
      orchestrator:
        condition: service_healthy
    networks:
      - checkout-net
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:5173/health"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s
