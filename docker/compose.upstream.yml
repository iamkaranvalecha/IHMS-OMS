# Orchestrator + checkout UI wired to real KB-IHMS and EC-OPS already running on the host.
# Lane 2 — use when upstream repos are deployed separately (their docker compose up).
#
# Prerequisites:
#   KB-IHMS API reachable (default host port 5000 → container 8080)
#   EC-OPS API reachable (default host port 8002)
#   ECOPS_BEARER_TOKEN set (JWT from POST /auth/token on EC-OPS)
#
# Usage:
#   cp .env.example .env   # set ECOPS_BEARER_TOKEN
#   bash scripts/upstream-stack.sh up
#
# With Prometheus:
#   OBS_STACK=1 bash scripts/upstream-stack.sh up

x-orchestrator-env: &orchestrator-env
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  LOG_JSON: ${LOG_JSON:-true}
  CATALOG_PATH: ${CATALOG_PATH:-/app/catalog/products.json}

x-orchestrator-logging: &orchestrator-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  orchestrator:
    build:
      context: ..
      dockerfile: docker/Dockerfile.orchestrator
    ports:
      - "${ORCHESTRATOR_PORT:-8000}:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      <<: *orchestrator-env
      IHMS_BASE_URL: ${IHMS_BASE_URL:-http://host.docker.internal:5000}
      ECOPS_BASE_URL: ${ECOPS_BASE_URL:-http://host.docker.internal:8002}
      ECOPS_BEARER_TOKEN: ${ECOPS_BEARER_TOKEN:?Set ECOPS_BEARER_TOKEN in .env — see docs/DOCKER.md}
      ECOPS_READ_TIMEOUT: ${ECOPS_READ_TIMEOUT:-10}
      IHMS_READ_TIMEOUT: ${IHMS_READ_TIMEOUT:-5}
      CATALOG_PATH: /app/catalog/products.json
    volumes:
      - ../catalog:/app/catalog:ro
    logging: *orchestrator-logging
    networks:
      - checkout-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 15s

  ui:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      # 5180 avoids clashing with KB-IHMS frontend on host 5173
      - "${UI_PORT:-5180}:5173"
    environment:
      VITE_API_URL: ""
    depends_on:
      orchestrator:
        condition: service_healthy
    networks:
      - checkout-net
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:5173/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 15s
