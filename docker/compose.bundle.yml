# Full platform stack — real KB-IHMS + EC-OPS + orchestrator + checkout UI.
# Builds sibling repos from paths on disk (Lane 2 bundled demo).
#
# Layout (recommended):
#   parent/
#     KB-IHMS/     ← docker compose up (or built here)
#     EC-OPS/
#     IHMS-OMS/    ← this repo
#
# Usage:
#   KB_IHMS_PATH=../KB-IHMS ECOPS_PATH=../EC-OPS bash scripts/upstream-stack.sh up --bundle
#
# After first boot, register an EC-OPS user and set ECOPS_BEARER_TOKEN in .env, then restart orchestrator.

x-orchestrator-env: &orchestrator-env
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  LOG_JSON: ${LOG_JSON:-true}
  CATALOG_PATH: ${CATALOG_PATH:-/app/catalog/products.json}

x-orchestrator-logging: &orchestrator-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  # ── KB-IHMS dependencies ────────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    volumes:
      - kb-ihms-mongodb:/data/db
    networks:
      - checkout-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    networks:
      - checkout-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    networks:
      - checkout-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  ihms-api:
    build:
      context: ${KB_IHMS_PATH:-../KB-IHMS}
      dockerfile: Dockerfile
    image: ${IHMS_IMAGE:-kb-ihms-api:local}
    ports:
      - "${IHMS_PORT:-5000}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      MongoDb__ConnectionString: mongodb://mongodb:27017
      MongoDb__DatabaseName: inventoryhold
      Redis__ConnectionString: redis:6379
      RabbitMq__Host: rabbitmq
      RabbitMq__Port: "5672"
      RabbitMq__Username: guest
      RabbitMq__Password: guest
      RabbitMq__VirtualHost: /
      Hold__ExpiryMinutes: "15"
      Cors__AllowedOrigins__0: http://localhost:${UI_PORT:-5180}
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - checkout-net
    # Health verified by scripts/upstream-stack.sh (aspnet image has no curl/wget)

  # ── EC-OPS dependencies ─────────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-ecops}
    volumes:
      - ecops-postgres:/var/lib/postgresql/data
    networks:
      - checkout-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-ecops}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  ecops-api:
    build:
      context: ${ECOPS_PATH:-../EC-OPS}
      dockerfile: ${ECOPS_DOCKERFILE:-upstream/ecops/Dockerfile}
      additional_contexts:
        oms-docker: ./upstream/ecops
    image: ${ECOPS_IMAGE:-ec-ops-api:local}
    ports:
      - "${ECOPS_PORT:-8002}:8002"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-ecops}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-docker-secret-change-me}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "1440"
      PORT: "8002"
      LOG_LEVEL: INFO
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - checkout-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8002/health')"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 45s

  # ── IHMS-OMS ────────────────────────────────────────────────────────────────
  orchestrator:
    build:
      context: ..
      dockerfile: docker/Dockerfile.orchestrator
    ports:
      - "${ORCHESTRATOR_PORT:-8000}:8000"
    environment:
      <<: *orchestrator-env
      IHMS_BASE_URL: http://ihms-api:8080
      ECOPS_BASE_URL: http://ecops-api:8002
      ECOPS_BEARER_TOKEN: ${ECOPS_BEARER_TOKEN:-}
      ECOPS_READ_TIMEOUT: ${ECOPS_READ_TIMEOUT:-10}
      IHMS_READ_TIMEOUT: ${IHMS_READ_TIMEOUT:-5}
      CATALOG_PATH: /app/catalog/products.json
    logging: *orchestrator-logging
    depends_on:
      ihms-api:
        condition: service_started
      ecops-api:
        condition: service_healthy
    networks:
      - checkout-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 15s

  ui:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "${UI_PORT:-5180}:5173"
    environment:
      VITE_API_URL: ""
    depends_on:
      orchestrator:
        condition: service_healthy
    networks:
      - checkout-net
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:5173/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

volumes:
  kb-ihms-mongodb:
  ecops-postgres:
